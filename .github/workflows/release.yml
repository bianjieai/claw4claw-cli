name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Generate Release Note
        id: release_note
        run: |
          git fetch --tags --force
          python3 .github/scripts/generate_release_note.py

      - name: Build Darwin arm64
        env:
          GOOS: darwin
          GOARCH: arm64
          CGO_ENABLED: 0
        run: |
          go build -ldflags="-s -w -X 'github.com/bianjieai/claw4claw-cli/cmd.Version=${{ steps.version.outputs.VERSION }}'" -trimpath -o c4c-Darwin-arm64 main.go

      - name: Build Darwin amd64
        env:
          GOOS: darwin
          GOARCH: amd64
          CGO_ENABLED: 0
        run: |
          go build -ldflags="-s -w -X 'github.com/bianjieai/claw4claw-cli/cmd.Version=${{ steps.version.outputs.VERSION }}'" -trimpath -o c4c-Darwin-x86_64 main.go

      - name: Build Linux amd64
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: 0
        run: |
          go build -ldflags="-s -w -X 'github.com/bianjieai/claw4claw-cli/cmd.Version=${{ steps.version.outputs.VERSION }}'" -trimpath -o c4c-Linux-x86_64 main.go

      - name: Build Linux arm64
        env:
          GOOS: linux
          GOARCH: arm64
          CGO_ENABLED: 0
        run: |
          go build -ldflags="-s -w -X 'github.com/bianjieai/claw4claw-cli/cmd.Version=${{ steps.version.outputs.VERSION }}'" -trimpath -o c4c-Linux-aarch64 main.go

      - name: Build Windows amd64
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: 0
        run: |
          go build -ldflags="-s -w -X 'github.com/bianjieai/claw4claw-cli/cmd.Version=${{ steps.version.outputs.VERSION }}'" -trimpath -o c4c-Windows-x86_64.exe main.go

      - name: Build Windows arm64
        env:
          GOOS: windows
          GOARCH: arm64
          CGO_ENABLED: 0
        run: |
          go build -ldflags="-s -w -X 'github.com/bianjieai/claw4claw-cli/cmd.Version=${{ steps.version.outputs.VERSION }}'" -trimpath -o c4c-Windows-aarch64.exe main.go

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_note.md
          generate_release_notes: false
          files: |
            c4c-Darwin-arm64
            c4c-Darwin-x86_64
            c4c-Linux-x86_64
            c4c-Linux-aarch64
            c4c-Windows-x86_64.exe
            c4c-Windows-aarch64.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload binaries to OSS (S3 compatible)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
          AWS_DEFAULT_REGION: ${{ secrets.OSS_REGION }}
        run: |
          ENDPOINT="${{ secrets.OSS_ENDPOINT }}"
          if [[ ! $ENDPOINT =~ ^https?:// ]]; then
            ENDPOINT="https://$ENDPOINT"
          fi

          VERSION_PATH="s3://${{ secrets.OSS_BUCKET }}/releases/${{ steps.version.outputs.VERSION }}"
          LATEST_PATH="s3://${{ secrets.OSS_BUCKET }}/releases/latest"

          FILES=(
            "c4c-Darwin-arm64"
            "c4c-Darwin-x86_64"
            "c4c-Linux-x86_64"
            "c4c-Linux-aarch64"
            "c4c-Windows-x86_64.exe"
            "c4c-Windows-aarch64.exe"
          )

          for FILE in "${FILES[@]}"; do
            echo "Uploading $FILE to $VERSION_PATH..."
            aws s3 cp "$FILE" "$VERSION_PATH/$FILE" --endpoint-url "$ENDPOINT"

            echo "Updating latest pointer for $FILE..."
            aws s3 cp "$VERSION_PATH/$FILE" "$LATEST_PATH/$FILE" --endpoint-url "$ENDPOINT"
          done