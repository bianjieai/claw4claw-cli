name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Get tag message
        id: tag_message
        run: |
          git fetch --tags --force
          TAG_MSG=$(git tag -l --format='%(contents)' ${{ github.ref_name }})
          {
            echo "BODY<<EOF"
            echo "$TAG_MSG"
            echo "EOF"
          } >> $GITHUB_ENV

      - name: Build Darwin arm64
        env:
          GOOS: darwin
          GOARCH: arm64
          CGO_ENABLED: 0
        run: |
          go build -ldflags="-s -w -X 'github.com/bianjieai/claw4claw-cli/cmd.Version=${{ steps.version.outputs.VERSION }}'" -trimpath -o c4c-Darwin-arm64 main.go

      - name: Build Darwin amd64
        env:
          GOOS: darwin
          GOARCH: amd64
          CGO_ENABLED: 0
        run: |
          go build -ldflags="-s -w -X 'github.com/bianjieai/claw4claw-cli/cmd.Version=${{ steps.version.outputs.VERSION }}'" -trimpath -o c4c-Darwin-x86_64 main.go

      - name: Build Linux amd64
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: 0
        run: |
          go build -ldflags="-s -w -X 'github.com/bianjieai/claw4claw-cli/cmd.Version=${{ steps.version.outputs.VERSION }}'" -trimpath -o c4c-Linux-x86_64 main.go

      - name: Build Linux arm64
        env:
          GOOS: linux
          GOARCH: arm64
          CGO_ENABLED: 0
        run: |
          go build -ldflags="-s -w -X 'github.com/bianjieai/claw4claw-cli/cmd.Version=${{ steps.version.outputs.VERSION }}'" -trimpath -o c4c-Linux-aarch64 main.go

      - name: Build Windows amd64
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: 0
        run: |
          go build -ldflags="-s -w -X 'github.com/bianjieai/claw4claw-cli/cmd.Version=${{ steps.version.outputs.VERSION }}'" -trimpath -o c4c-Windows-x86_64.exe main.go

      - name: Build Windows arm64
        env:
          GOOS: windows
          GOARCH: arm64
          CGO_ENABLED: 0
        run: |
          go build -ldflags="-s -w -X 'github.com/bianjieai/claw4claw-cli/cmd.Version=${{ steps.version.outputs.VERSION }}'" -trimpath -o c4c-Windows-aarch64.exe main.go

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ env.BODY }}
          generate_release_notes: false
          files: |
            c4c-Darwin-arm64
            c4c-Darwin-x86_64
            c4c-Linux-x86_64
            c4c-Linux-aarch64
            c4c-Windows-x86_64.exe
            c4c-Windows-aarch64.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Aliyun OSSUTIL
        uses: manyuanrong/setup-ossutil@v3.0
        with:
          endpoint: ${{ secrets.OSS_ENDPOINT }}
          access-key-id: ${{ secrets.OSS_ACCESS_KEY_ID }}
          access-key-secret: ${{ secrets.OSS_ACCESS_KEY_SECRET }}

      - name: Upload binaries to OSS
        run: |
          # Upload versioned binaries
          ossutil cp -f c4c-Darwin-arm64 oss://${{ secrets.OSS_BUCKET }}/releases/${{ steps.version.outputs.VERSION }}/c4c-Darwin-arm64
          ossutil cp -f c4c-Darwin-x86_64 oss://${{ secrets.OSS_BUCKET }}/releases/${{ steps.version.outputs.VERSION }}/c4c-Darwin-x86_64
          ossutil cp -f c4c-Linux-x86_64 oss://${{ secrets.OSS_BUCKET }}/releases/${{ steps.version.outputs.VERSION }}/c4c-Linux-x86_64
          ossutil cp -f c4c-Linux-aarch64 oss://${{ secrets.OSS_BUCKET }}/releases/${{ steps.version.outputs.VERSION }}/c4c-Linux-aarch64
          ossutil cp -f c4c-Windows-x86_64.exe oss://${{ secrets.OSS_BUCKET }}/releases/${{ steps.version.outputs.VERSION }}/c4c-Windows-x86_64.exe
          ossutil cp -f c4c-Windows-aarch64.exe oss://${{ secrets.OSS_BUCKET }}/releases/${{ steps.version.outputs.VERSION }}/c4c-Windows-aarch64.exe

          # Update latest pointers using symlinks
          ossutil api put-symlink --bucket ${{ secrets.OSS_BUCKET }} --key releases/latest/c4c-Darwin-arm64 --symlink-target releases/${{ steps.version.outputs.VERSION }}/c4c-Darwin-arm64
          ossutil api put-symlink --bucket ${{ secrets.OSS_BUCKET }} --key releases/latest/c4c-Darwin-x86_64 --symlink-target releases/${{ steps.version.outputs.VERSION }}/c4c-Darwin-x86_64
          ossutil api put-symlink --bucket ${{ secrets.OSS_BUCKET }} --key releases/latest/c4c-Linux-x86_64 --symlink-target releases/${{ steps.version.outputs.VERSION }}/c4c-Linux-x86_64
          ossutil api put-symlink --bucket ${{ secrets.OSS_BUCKET }} --key releases/latest/c4c-Linux-aarch64 --symlink-target releases/${{ steps.version.outputs.VERSION }}/c4c-Linux-aarch64
          ossutil api put-symlink --bucket ${{ secrets.OSS_BUCKET }} --key releases/latest/c4c-Windows-x86_64.exe --symlink-target releases/${{ steps.version.outputs.VERSION }}/c4c-Windows-x86_64.exe
          ossutil api put-symlink --bucket ${{ secrets.OSS_BUCKET }} --key releases/latest/c4c-Windows-aarch64.exe --symlink-target releases/${{ steps.version.outputs.VERSION }}/c4c-Windows-aarch64.exe